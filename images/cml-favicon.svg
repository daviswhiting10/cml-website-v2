<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" width="700" height="560" role="img" aria-label="Central Maryland Lacrosse">
  <defs>
    <style>
      .ink { fill: #000000; }
      .stroke-ink { stroke: #000000; fill: none; }
      .serif-heavy { font-family: 'Times New Roman', Georgia, serif; font-weight: 900; }
    </style>
  </defs>

  <rect fill="#ffffff" x="0" y="0" width="700" height="560"/>

  <!-- Shorter shield with a shallower V-point at the bottom -->
  <path class="stroke-ink" stroke-width="7" stroke-linejoin="miter" d="
    M 80,120 L 620,120 L 620,400 L 350,500 L 80,400 Z"/>

  <path class="ink" d="M 80,120 L 620,120 L 620,195 L 80,195 Z"/>

  <text x="350" y="168" text-anchor="middle" class="serif-heavy" fill="#ffffff" font-size="26" letter-spacing="4">CENTRAL MARYLAND LACROSSE</text>

  <!-- CML centered in the tighter body -->
  <text x="350" y="310" text-anchor="middle" dominant-baseline="middle"
        class="serif-heavy ink" font-size="220" letter-spacing="0">CML</text>
</svg>
